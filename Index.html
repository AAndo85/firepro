<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>FirePro</title>
</head>
<body class="bg-zinc-950 text-white font-sans p-5 flex flex-col items-center justify-center min-h-screen">
    <div id="setup" class="text-center">
        <h1 class="text-5xl font-black mb-8 text-orange-500">FIREPRO</h1>
        <input type="text" id="libCode" placeholder="Enter Code" class="bg-zinc-800 p-4 rounded-xl w-64 text-center text-2xl border-2 border-transparent focus:border-orange-500 outline-none mb-4">
        <button onclick="loadLib()" class="block w-full bg-orange-600 hover:bg-orange-700 py-4 rounded-xl font-bold text-xl">ENTER</button>
    </div>
    <div id="library" class="hidden w-full max-w-md">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold text-orange-500">My Library</h2>
            <button onclick="location.reload()" class="text-zinc-500 italic">Exit</button>
        </div>
        <div id="appGrid"></div>
    </div>
    <script>
        function loadLib() {
            const code = document.getElementById('libCode').value;
            fetch('firepro.json').then(r => r.json()).then(data => {
                if(data[code]) {
                    document.getElementById('setup').classList.add('hidden');
                    document.getElementById('library').classList.remove('hidden');
                    data[code].forEach(app => {
                        document.getElementById('appGrid').innerHTML += `
                            <div class="bg-zinc-900 border border-zinc-800 p-5 rounded-2xl mb-4">
                                <img src="${app.icon}" class="w-12 h-12 mb-3">
                                <h3 class="font-bold text-lg">${app.name}</h3>
                                <p class="text-sm text-zinc-400 mb-4">${app.desc}</p>
                                <a href="${app.url}" class="block bg-blue-600 text-center py-3 rounded-lg font-bold">Download Now</a>
                            </div>`;
                    });
                } else { alert("Invalid Code!"); }
            });
        }
    </script>
</body>
</html>
