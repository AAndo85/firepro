<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>FirePro Library</title>
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; }
        .app-card { background: #0f0f0f; border: 2px solid #1a1a1a; width: 320px; transition: 0.3s; }
        .app-card:hover { border-color: #ea580c; transform: scale(1.02); }
    </style>
</head>
<body class="p-6">

    <div id="login-box" class="flex flex-col items-center justify-center min-h-screen">
        <h1 class="text-6xl font-black text-orange-600 italic mb-10 text-center">FIREPRO</h1>
        <input type="text" id="code" placeholder="ENTER ACCESS CODE" class="bg-zinc-900 border-2 border-zinc-800 p-4 rounded-2xl text-center w-80 outline-none focus:border-orange-600 mb-4 font-bold text-xl uppercase text-white">
        <button onclick="checkCode()" class="bg-orange-600 w-80 py-4 rounded-2xl font-black hover:bg-orange-500 transition">ACCESS LIBRARY</button>
    </div>

    <div id="library" class="hidden">
        <div class="flex justify-between items-center mb-10 border-b border-zinc-900 pb-6">
            <h1 class="text-4xl font-black italic text-orange-600 uppercase">Firepro <span class="text-white not-italic text-xl ml-2 opacity-50">Library</span></h1>
            <button onclick="location.reload()" class="bg-zinc-800 px-6 py-2 rounded-xl text-xs font-bold uppercase">Logout</button>
        </div>
        <div id="flex-container" class="flex flex-wrap justify-center gap-8 pb-20"></div>
    </div>

    <script>
        // THE FIX: Forces the browser to name the file correctly as an .apk
        async function downloadAPK(url, fileName) {
            try {
                const response = await fetch(url);
                const blob = await response.blob();
                const link = document.createElement('a');
                link.href = window.URL.createObjectURL(blob);
                link.download = fileName.endsWith('.apk') ? fileName : fileName + '.apk';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            } catch (e) {
                // Fallback if fetch fails due to security rules
                window.location.href = url;
            }
        }

        function checkCode() {
            const input = document.getElementById('code').value;
            fetch('./firepro.json')
                .then(res => res.json())
                .then(data => {
                    if (data[input]) {
                        document.getElementById('login-box').classList.add('hidden');
                        document.getElementById('library').classList.remove('hidden');
                        
                        const sortedApps = data[input].sort((a, b) => a.name.localeCompare(b.name));
                        const container = document.getElementById('flex-container');
                        
                        sortedApps.forEach(app => {
                            container.innerHTML += `
                                <div class="app-card p-8 rounded-[2.5rem] flex flex-col items-center text-center shadow-2xl">
                                    <img src="${app.icon}" class="w-28 h-28 rounded-3xl mb-6 shadow-xl object-cover border-2 border-zinc-800">
                                    <h3 class="font-black text-2xl mb-1 uppercase tracking-tighter">${app.name}</h3>
                                    <p class="text-xs text-zinc-500 mb-8 uppercase tracking-widest font-bold opacity-60">${app.desc}</p>
                                    
                                    <button onclick="downloadAPK('${app.url}', '${app.name}')" class="w-full bg-orange-600 py-4 rounded-2xl font-black text-sm uppercase tracking-widest hover:bg-orange-500 transition shadow-lg">
                                        Install Now
                                    </button>
                                </div>`;
                        });
                    } else { alert("Access Code Invalid"); }
                });
        }
    </script>
</body>
</html>
