<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>FirePro</title>
    <style>
        body { background-color: #000000; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="text-white flex flex-col items-center justify-center min-h-screen p-6">
    <div id="login-box" class="text-center w-full max-w-sm">
        <h1 class="text-5xl font-black text-orange-500 mb-2 italic">FIREPRO</h1>
        <p class="text-zinc-500 mb-10 tracking-widest uppercase text-xs">Media Library</p>
        <input type="text" id="code" placeholder="ENTER CODE" class="w-full bg-zinc-900 border-2 border-zinc-800 p-4 rounded-2xl text-center text-xl font-bold focus:border-orange-500 outline-none transition-all mb-4">
        <button onclick="checkCode()" class="w-full bg-orange-600 hover:bg-orange-500 py-4 rounded-2xl font-black text-lg shadow-lg shadow-orange-900/20 active:scale-95 transition">ACCESS LIBRARY</button>
    </div>

    <div id="library" class="hidden w-full max-w-md">
        <div class="flex justify-between items-end mb-8">
            <h2 class="text-3xl font-bold text-orange-500">Dashboard</h2>
            <button onclick="location.reload()" class="text-zinc-600 text-sm pb-1 underline">Logout</button>
        </div>
        <div id="grid"></div>
    </div>

    <script>
        function checkCode() {
            const input = document.getElementById('code').value;
            fetch('firepro.json')
                .then(res => res.json())
                .then(data => {
                    if (data[input]) {
                        document.getElementById('login-box').classList.add('hidden');
                        document.getElementById('library').classList.remove('hidden');
                        data[input].forEach(app => {
                            document.getElementById('grid').innerHTML += `
                                <div class="bg-zinc-900 border border-zinc-800 p-5 rounded-3xl mb-4 flex items-center gap-4">
                                    <img src="${app.icon}" class="w-14 h-14 rounded-xl shadow-md">
                                    <div class="flex-1">
                                        <h3 class="font-bold text-lg">${app.name}</h3>
                                        <p class="text-xs text-zinc-500 mb-3">${app.desc}</p>
                                        <a href="${app.url}" class="inline-block bg-blue-600 text-xs px-4 py-2 rounded-full font-bold">Download Now</a>
                                    </div>
                                </div>`;
                        });
                    } else { alert("Invalid access code."); }
                }).catch(err => alert("Error: Make sure your GitHub Pages is live."));
        }
    </script>
</body>
</html>
