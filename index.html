<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>FirePro Library</title>
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; overflow: hidden; }
        .app-card { background: #0f0f0f; border: 2px solid #1a1a1a; width: 320px; transition: 0.2s; outline: none; }
        
        /* THE FOCUS FIX: Essential for Firestick Remote navigation */
        .selectable:focus { 
            background-color: #ffffff !important; 
            color: #ea580c !important;
            outline: 12px solid #ea580c; 
            transform: scale(1.08);
            z-index: 100;
        }
    </style>
</head>
<body class="p-6">

    <div id="login-box" class="flex flex-col items-center justify-center min-h-screen">
        <h1 class="text-6xl font-black text-orange-600 italic mb-10 text-center">FIREPRO</h1>
        <input type="text" id="code" placeholder="ENTER ACCESS CODE" class="bg-zinc-900 border-2 border-zinc-800 p-4 rounded-2xl text-center w-80 outline-none focus:border-orange-600 mb-4 font-bold text-xl uppercase text-white selectable">
        <button onclick="checkCode()" class="bg-orange-600 w-80 py-4 rounded-2xl font-black shadow-lg selectable">ACCESS LIBRARY</button>
    </div>

    <div id="library" class="hidden">
        <div class="flex justify-between items-center mb-10 border-b border-zinc-900 pb-6">
            <h1 class="text-4xl font-black italic text-orange-600 uppercase">Firepro</h1>
            <div class="flex gap-4">
                <a href="javascript:location.reload()" class="bg-zinc-800 px-6 py-2 rounded-xl text-xs font-bold uppercase selectable no-underline text-white">Logout</a>
                <a href="https://www.amazon.com" class="bg-red-700 px-6 py-2 rounded-xl text-xs font-bold uppercase selectable no-underline text-white">Exit</a>
            </div>
        </div>
        <div id="flex-container" class="flex flex-wrap justify-center gap-8 pb-20"></div>
    </div>

    <script>
        // FIRE TV REMOTE HANDLER
        window.addEventListener('keydown', function(e) {
            // Select Button (Center Circle)
            if (e.keyCode === 13 || e.keyCode === 23) {
                if (document.activeElement) document.activeElement.click();
            }
            // Back Button Fix (Forces reload or logout)
            if (e.keyCode === 4 || e.keyCode === 8 || e.keyCode === 461) {
                if (!document.getElementById('library').classList.contains('hidden')) {
                    location.reload(); 
                }
                e.preventDefault();
            }
        });

        function checkCode() {
            const input = document.getElementById('code').value;
            fetch('./firepro.json')
                .then(res => res.json())
                .then(data => {
                    if (data[input]) {
                        document.getElementById('login-box').style.display = 'none';
                        document.getElementById('library').classList.remove('hidden');
                        const container = document.getElementById('flex-container');
                        container.innerHTML = ''; 
                        
                        const sortedApps = data[input].sort((a, b) => a.name.localeCompare(b.name));
                        
                        sortedApps.forEach(app => {
                            const card = document.createElement('div');
                            card.className = "app-card p-8 rounded-[2.5rem] flex flex-col items-center text-center shadow-2xl";
                            
                            // INSTALL FIX: Uses an Intent-style link to force the Firestick to open the system browser
                            // This bypasses the WebIntoApp "sandbox" that is blocking your downloads
                            card.innerHTML = `
                                <img src="${app.icon}" class="w-28 h-28 rounded-3xl mb-6 object-cover border-2 border-zinc-800">
                                <h3 class="font-black text-2xl mb-1 uppercase tracking-tighter">${app.name}</h3>
                                <p class="text-xs text-zinc-500 mb-8 uppercase tracking-widest font-bold opacity-60">${app.desc}</p>
                                <a href="intent:${app.url}#Intent;scheme=https;package=com.android.chrome;end" 
                                   class="w-full bg-orange-600 py-4 rounded-2xl font-black text-sm uppercase text-center block no-underline selectable text-white">
                                   Install Now
                                </a>`;
                            container.appendChild(card);
                        });

                        // Set focus so remote starts working immediately
                        setTimeout(() => {
                            const first = document.querySelector('.selectable');
                            if (first) first.focus();
                        }, 300);
                    } else { alert("Invalid Access Code"); }
                });
        }
    </script>
</body>
</html>
