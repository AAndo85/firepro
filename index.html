<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIREPRO | Media Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none; }
    </style>
</head>
<body class="bg-black text-zinc-100 min-h-screen flex flex-col items-center p-8">

    <header class="text-center mb-12">
        <h1 class="text-5xl font-black text-orange-700 tracking-tighter">FIREPRO</h1>
        <p class="text-zinc-500 uppercase tracking-widest text-sm mt-2">Media Library</p>
    </header>

    <div id="login-box" class="w-full max-w-md bg-zinc-900/50 p-6 rounded-2xl border border-zinc-800 backdrop-blur-sm">
        <input 
            type="text" 
            id="login-input" 
            placeholder="Enter Access Code" 
            class="w-full bg-zinc-800 border border-zinc-700 rounded-xl p-4 text-center text-xl font-mono focus:outline-none focus:ring-2 focus:ring-orange-700 mb-4"
        >
        <button 
            onclick="checkCode()" 
            class="w-full bg-orange-700 hover:bg-orange-600 text-white font-bold py-4 rounded-xl transition-all active:scale-95"
        >
            Access Library
        </button>
    </div>

    <div id="library-section" class="w-full max-w-6xl hidden">
        <div id="grid-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </div>

    <script>
        function checkCode() {
            const inputField = document.getElementById('login-input');
            const loginBox = document.getElementById('login-box');
            const librarySection = document.getElementById('library-section');
            const grid = document.getElementById('grid-container');
            const code = inputField.value.trim();

            if (!code) {
                alert("Please enter a code.");
                return;
            }

            // Fetches the JSON file from the current directory
            fetch('./firepro.json')
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`Could not find firepro.json (Status: ${response.status})`);
                    }
                    return response.json();
                })
                .then(data => {
                    // Look for the code as a key in your JSON file
                    if (data[code]) {
                        // Hide login and show library
                        loginBox.classList.add('hidden');
                        librarySection.classList.remove('hidden');

                        // Clear the grid and build the new items
                        grid.innerHTML = '';
                        let htmlContent = '';

                        data[code].forEach(item => {
                            htmlContent += `
                                <div class="bg-zinc-900 p-6 rounded-2xl border border-zinc-800 hover:border-orange-900 transition-colors">
                                    <div class="flex items-center mb-4">
                                        <div class="w-12 h-12 bg-orange-900/20 rounded-lg flex items-center justify-center mr-4">
                                            <img src="${item.icon || 'https://via.placeholder.com/48'}" class="w-8 h-8 object-contain" alt="">
                                        </div>
                                        <h3 class="text-xl font-bold text-white">${item.name}</h3>
                                    </div>
                                    <p class="text-zinc-400 mb-6 text-sm leading-relaxed">${item.desc || 'No description available.'}</p>
                                    <a href="${item.url}" target="_blank" class="inline-block w-full text-center bg-zinc-800 hover:bg-zinc-700 text-orange-500 font-semibold py-2 rounded-lg transition-colors">
                                        Launch Application
                                    </a>
                                </div>`;
                        });
                        grid.innerHTML = htmlContent;
                    } else {
                        alert("Invalid access code. Please try again.");
                    }
                })
                .catch(error => {
                    console.error("Error details:", error);
                    alert("System Error: " + error.message);
                });
        }

        // Allow pressing "Enter" to submit
        document.getElementById('login-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                checkCode();
            }
        });
    </script>
</body>
</html>
