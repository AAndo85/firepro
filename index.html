<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>FirePro Library</title>
    <style>
        body { background-color: #000; color: white; }
        .app-card { background: #0f0f0f; border: 2px solid #1a1a1a; width: 320px; }
        .app-card:hover { border-color: #ea580c; }
    </style>
</head>
<body class="p-6">

    <div id="login-box" class="flex flex-col items-center justify-center min-h-screen">
        <h1 class="text-6xl font-black text-orange-600 italic mb-10">FIREPRO</h1>
        <input type="text" id="code" placeholder="ENTER CODE" class="bg-zinc-900 border-2 border-zinc-800 p-4 rounded-2xl text-center w-80 outline-none focus:border-orange-600 mb-4 font-bold text-white uppercase">
        <button onclick="checkCode()" class="bg-orange-600 w-80 py-4 rounded-2xl font-black hover:bg-orange-500 transition">ACCESS LIBRARY</button>
    </div>

    <div id="library" class="hidden">
        <div class="flex justify-between items-center mb-10 border-b border-zinc-900 pb-6">
            <h1 class="text-4xl font-black italic text-orange-600 uppercase">Firepro <span class="text-white not-italic text-xl ml-2 opacity-50">Library</span></h1>
            <button onclick="location.reload()" class="bg-zinc-800 px-6 py-2 rounded-xl text-xs font-bold uppercase">Logout</button>
        </div>
        <div id="flex-container" class="flex flex-wrap justify-center gap-8 pb-20"></div>
    </div>

    <script>
        function checkCode() {
            const input = document.getElementById('code').value;
            fetch('./firepro.json')
                .then(res => res.json())
                .then(data => {
                    if (data[input]) {
                        document.getElementById('login-box').classList.add('hidden');
                        document.getElementById('library').classList.remove('hidden');
                        
                        const container = document.getElementById('flex-container');
                        data[input].forEach(app => {
                            container.innerHTML += `
                                <div class="app-card p-8 rounded-[2.5rem] flex flex-col items-center text-center shadow-2xl">
                                    <img src="${app.icon}" class="w-28 h-28 rounded-3xl mb-6 object-cover border-2 border-zinc-800">
                                    <h3 class="font-black text-2xl mb-1 uppercase">${app.name}</h3>
                                    <p class="text-xs text-zinc-500 mb-8 uppercase">${app.desc}</p>
                                    <button onclick="window.location.href='${app.url}'" class="w-full bg-orange-600 py-4 rounded-2xl font-black text-sm uppercase hover:bg-orange-500 transition shadow-lg">
                                        Install Now
                                    </button>
                                </div>`;
                        });
                    } else { alert("Invalid Code"); }
                });
        }
    </script>
</body>
</html>
