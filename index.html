<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FirePro | Home Hub</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            font-size: 3rem;
            color: #FF9800;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p {
            color: #888;
            font-size: 1.2rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 1200px;
        }

        .card {
            background: #1e1e1e;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            text-decoration: none;
            color: white;
            transition: transform 0.2s;
            border: 2px solid transparent;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 200px;
        }

        /* The App's Kotlin code will apply the Glow effect here when focused */
        
        .card h2 {
            margin: 10px 0;
            font-size: 1.8rem;
        }

        .card p {
            font-size: 1rem;
            margin: 5px 0 15px 0;
        }

        .btn {
            background-color: #FF9800;
            color: black;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            display: inline-block;
            margin-top: auto;
        }

        footer {
            margin-top: 100px;
            color: #444;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>FirePro Hub</h1>
        <p>Select an app below to begin downloading</p>
    </header>

    <div class="grid">
        <!-- APP CARD 1 -->
        <a href="https://example.com/app1.apk" class="card">
            <h2>App Name 1</h2>
            <p>Version 2.0 • 45MB</p>
            <div class="btn">DOWNLOAD</div>
        </a>

        <!-- APP CARD 2 -->
        <a href="https://example.com/app2.apk" class="card">
            <h2>App Name 2</h2>
            <p>Version 1.5 • 12MB</p>
            <div class="btn">DOWNLOAD</div>
        </a>

        <!-- APP CARD 3 -->
        <a href="https://example.com/app3.apk" class="card">
            <h2>App Name 3</h2>
            <p>Version 4.2 • 88MB</p>
            <div class="btn">DOWNLOAD</div>
        </a>
    </div>

    <footer>
        FirePro Standalone Hub • Device Tracking Active
    </footer>

</body>
</html>
