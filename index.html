<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>FirePro Library</title>
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; overflow: hidden; }
        .app-card { background: #0f0f0f; border: 2px solid #1a1a1a; width: 320px; transition: 0.3s; outline: none; }
        
        /* THE FOCUS FIX: Visual highlight so the TV remote knows where it is */
        button:focus, a:focus, .selectable:focus { 
            background-color: #ffffff !important; 
            color: #ea580c !important;
            outline: 10px solid #ea580c; 
            transform: scale(1.05);
        }
    </style>
</head>
<body class="p-6">

    <div id="login-box" class="flex flex-col items-center justify-center min-h-screen">
        <h1 class="text-6xl font-black text-orange-600 italic mb-10 text-center">FIREPRO</h1>
        <input type="text" id="code" placeholder="ENTER ACCESS CODE" class="bg-zinc-900 border-2 border-zinc-800 p-4 rounded-2xl text-center w-80 outline-none focus:border-orange-600 mb-4 font-bold text-xl uppercase text-white">
        <button onclick="checkCode()" class="bg-orange-600 w-80 py-4 rounded-2xl font-black shadow-lg selectable">ACCESS LIBRARY</button>
    </div>

    <div id="library" class="hidden">
        <div class="flex justify-between items-center mb-10 border-b border-zinc-900 pb-6">
            <h1 class="text-4xl font-black italic text-orange-600 uppercase">Firepro</h1>
            <div class="flex gap-4">
                <button onclick="location.reload()" class="bg-zinc-800 px-6 py-2 rounded-xl text-xs font-bold uppercase selectable">Logout</button>
                <button onclick="window.close();" class="bg-red-700 px-6 py-2 rounded-xl text-xs font-bold uppercase selectable">Exit</button>
            </div>
        </div>
        <div id="flex-container" class="flex flex-wrap justify-center gap-8 pb-20"></div>
    </div>

    <script>
        // GLOBAL REMOTE HANDLER
        window.addEventListener('keydown', function(e) {
            // Select Button (Center Circle)
            if (e.keyCode === 13) {
                if (document.activeElement) document.activeElement.click();
            }
            // Back Button Fix (Forces app to show login or exit)
            if (e.keyCode === 4 || e.keyCode === 8 || e.keyCode === 461) {
                if (!document.getElementById('library').classList.contains('hidden')) {
                    location.reload(); 
                    e.preventDefault();
                } else {
                    // Try to close the app if on login screen
                    window.close();
                }
            }
        });

        function checkCode() {
            const input = document.getElementById('code').value;
            fetch('./firepro.json')
                .then(res => res.json())
                .then(data => {
                    if (data[input]) {
                        document.getElementById('login-box').classList.add('hidden');
                        document.getElementById('library').classList.remove('hidden');
                        const container = document.getElementById('flex-container');
                        container.innerHTML = ''; 
                        
                        const sortedApps = data[input].sort((a, b) => a.name.localeCompare(b.name));
                        
                        sortedApps.forEach(app => {
                            const card = document.createElement('div');
                            card.className = "app-card p-8 rounded-[2.5rem] flex flex-col items-center text-center shadow-2xl";
                            // FIXED INSTALL: Force standard download behavior
                            card.innerHTML = `
                                <img src="${app.icon}" class="w-28 h-28 rounded-3xl mb-6 object-cover">
                                <h3 class="font-black text-2xl mb-1 uppercase">${app.name}</h3>
                                <p class="text-xs text-zinc-500 mb-8 uppercase">${app.desc}</p>
                                <a href="${app.url}" download target="_blank" class="install-btn w-full bg-orange-600 py-4 rounded-2xl font-black text-sm uppercase text-center block no-underline selectable">
                                   Install Now
                                </a>`;
                            container.appendChild(card);
                        });

                        // Set focus so remote starts working immediately
                        setTimeout(() => document.querySelector('.selectable').focus(), 300);
                    } else { alert("Invalid Code"); }
                });
        }
    </script>
</body>
</html>
