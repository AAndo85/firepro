<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: white; overflow: hidden; font-family: sans-serif; }
        .selectable:focus { 
            background-color: white !important; 
            color: #ea580c !important; 
            outline: 10px solid #ea580c;
            transform: scale(1.05);
        }
    </style>
</head>
<body class="p-6">

    <div id="login-box" class="flex flex-col items-center justify-center min-h-screen">
        <h1 class="text-6xl font-black text-orange-600 mb-10 italic uppercase">FirePro</h1>
        <input type="text" id="code" class="bg-zinc-900 p-4 rounded-2xl w-80 text-white selectable text-center uppercase outline-none" placeholder="ENTER CODE">
        <button onclick="checkCode()" class="bg-orange-600 w-80 py-4 mt-4 rounded-2xl font-black selectable uppercase">Access Library</button>
    </div>

    <div id="library" class="hidden">
        <div class="flex justify-between items-center mb-10 border-b border-zinc-900 pb-6">
            <h1 class="text-3xl font-black text-orange-600 italic uppercase">FirePro</h1>
            <div class="flex gap-4">
                <button onclick="location.reload()" class="bg-zinc-800 px-6 py-2 rounded-xl selectable font-bold uppercase">Logout</button>
                <button onclick="location.reload()" class="bg-red-700 px-6 py-2 rounded-xl selectable font-bold uppercase">Exit</button>
            </div>
        </div>
        <div id="flex-container" class="flex flex-wrap justify-center gap-8"></div>
    </div>

    <script>
        function checkCode() {
            const input = document.getElementById('code').value;
            fetch('./firepro.json').then(res => res.json()).then(data => {
                if (data[input]) {
                    document.getElementById('login-box').style.display = 'none';
                    document.getElementById('library').classList.remove('hidden');
                    const container = document.getElementById('flex-container');
                    
                    data[input].forEach(app => {
                        // FIX: Convert the URL from your JSON into a direct download link
                        // This replaces 'www.dropbox.com' with 'dl.dropboxusercontent.com'
                        let directUrl = app.url.replace('www.dropbox.com', 'dl.dropboxusercontent.com');
                        
                        const card = document.createElement('div');
                        card.className = "bg-zinc-900 p-8 rounded-[2.5rem] flex flex-col items-center w-72";
                        
                        // THE FIX: Each button now uses its own 'directUrl' from the JSON data
                        card.innerHTML = `
                            <img src="${app.icon}" class="w-24 h-24 mb-4 rounded-2xl">
                            <h3 class="font-bold uppercase text-xl mb-6">${app.name}</h3>
                            <a href="${directUrl}" class="w-full bg-orange-600 py-4 rounded-2xl font-black text-center no-underline selectable text-white uppercase">Install Now</a>
                        `;
                        container.appendChild(card);
                    });
                    
                    setTimeout(() => {
                        const first = document.querySelector('.selectable');
                        if (first) first.focus();
                    }, 500);
                }
            });
        }

        document.addEventListener('keydown', function(e) {
            if (e.keyCode === 13) document.activeElement.click(); 
            if (e.keyCode === 8 || e.keyCode === 461) {
                if (!document.getElementById('library').classList.contains('hidden')) {
                    location.reload();
                }
            }
        });
    </script>
</body>
</html>
