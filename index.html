<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>FirePro</title>
    <style>
        body { background-color: #000; color: white; overflow-x: hidden; }
        /* Professional Card Style */
        .app-card { 
            background: #0a0a0a; 
            border: 1px solid #1a1a1a; 
            width: 320px; 
            flex-shrink: 0;
            transition: all 0.2s;
        }
        .app-card:hover { border-color: #ea580c; background: #111; transform: translateY(-5px); }
        /* Hide scrollbar but keep functionality */
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-6">
    <div id="login-box" class="flex flex-col items-center justify-center min-h-screen">
        <h1 class="text-6xl font-black text-orange-600 mb-2 italic tracking-tighter">FIREPRO</h1>
        <p class="text-zinc-500 text-xs tracking-[0.3em] mb-8">AUTHENTICATED ACCESS</p>
        <input type="text" id="code" placeholder="ENTER CODE" class="bg-zinc-900 border-2 border-zinc-800 p-4 rounded-2xl text-center w-72 outline-none focus:border-orange-600 mb-4 font-bold text-xl">
        <button onclick="checkCode()" class="bg-orange-600 w-72 py-4 rounded-2xl font-black hover:bg-orange-500 active:scale-95 transition">LOGIN</button>
    </div>

    <div id="library" class="hidden">
        <div class="flex justify-between items-center mb-12 border-b border-zinc-900 pb-6">
            <h1 class="text-4xl font-black italic text-orange-600">FIREPRO <span class="text-white not-italic text-xl ml-2 opacity-50">LIBRARY</span></h1>
            <button onclick="location.reload()" class="text-zinc-500 text-sm hover:text-white">Exit</button>
        </div>
        
        <div id="flex-container" class="flex flex-wrap justify-center gap-6 pb-20"></div>
    </div>

    <script>
        function checkCode() {
            const input = document.getElementById('code').value;
            fetch('./firepro.json')
                .then(res => res.json())
                .then(data => {
                    if (data[input]) {
                        document.getElementById('login-box').classList.add('hidden');
                        document.getElementById('library').classList.remove('hidden');
                        
                        // ALPHABETICAL SORTING LOGIC
                        const sortedApps = data[input].sort((a, b) => a.name.localeCompare(b.name));

                        const container = document.getElementById('flex-container');
                        sortedApps.forEach(app => {
                            container.innerHTML += `
                                <div class="app-card p-6 rounded-3xl flex flex-col items-center text-center">
                                    <img src="${app.icon}" class="w-20 h-20 rounded-2xl mb-4 shadow-2xl border-2 border-zinc-800">
                                    <h3 class="font-black text-lg mb-1 uppercase tracking-tight">${app.name}</h3>
                                    <p class="text-[10px] text-zinc-500 mb-6 h-8 overflow-hidden">${app.desc}</p>
                                    <a href="${app.url}" class="w-full bg-orange-600 py-3 rounded-xl font-black text-xs hover:bg-orange-500 transition">DOWNLOAD APK</a>
                                </div>`;
                        });
                    } else { alert("Invalid Code"); }
                }).catch(() => alert("Network Error: Update firepro.json"));
        }
    </script>
</body>
</html>
