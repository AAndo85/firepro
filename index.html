<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>FirePro Library</title>
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; overflow-x: hidden; }
        .app-card { background: #0f0f0f; border: 2px solid #1a1a1a; width: 320px; transition: 0.3s; }
        
        /* THE FIX: High-visibility focus for TV Remotes */
        button:focus, a:focus { 
            background-color: #ffffff !important; 
            color: #ea580c !important;
            outline: 8px solid #ea580c; 
            transform: scale(1.1);
        }
        /* Visual indicator for the card being selected */
        .app-card:focus-within { border-color: #ea580c; background: #1a1a1a; }
    </style>
</head>
<body class="p-6">

    <div id="login-box" class="flex flex-col items-center justify-center min-h-screen">
        <h1 class="text-6xl font-black text-orange-600 italic mb-10 text-center">FIREPRO</h1>
        <input type="text" id="code" placeholder="ENTER ACCESS CODE" class="bg-zinc-900 border-2 border-zinc-800 p-4 rounded-2xl text-center w-80 outline-none focus:border-orange-600 mb-4 font-bold text-xl uppercase text-white">
        <button onclick="checkCode()" class="bg-orange-600 w-80 py-4 rounded-2xl font-black shadow-lg">Access Library</button>
    </div>

    <div id="library" class="hidden">
        <div class="flex justify-between items-center mb-10 border-b border-zinc-900 pb-6">
            <h1 class="text-4xl font-black italic text-orange-600 uppercase">Firepro <span class="text-white not-italic text-xl ml-2 opacity-50">Library</span></h1>
            <div class="flex gap-4">
                <button id="logout-btn" onclick="location.reload()" class="bg-zinc-800 px-6 py-2 rounded-xl text-xs font-bold uppercase">Logout</button>
                <button onclick="window.history.back()" class="bg-red-700 px-6 py-2 rounded-xl text-xs font-bold uppercase">Exit App</button>
            </div>
        </div>
        <div id="flex-container" class="flex flex-wrap justify-center gap-8 pb-20"></div>
    </div>

    <script>
        // TV Remote Handler: Listens specifically for the "Center" select button (KeyCode 13)
        window.addEventListener('keydown', function(event) {
            if (event.keyCode === 13) {
                const focused = document.activeElement;
                if (focused && focused.tagName === 'BUTTON') {
                    focused.click();
                }
            }
            if (event.key === 'Backspace' || event.keyCode === 8) {
                if (!document.getElementById('library').classList.contains('hidden')) {
                    location.reload();
                }
            }
        });

        function checkCode() {
            const input = document.getElementById('code').value;
            fetch('./firepro.json')
                .then(res => res.json())
                .then(data => {
                    if (data[input]) {
                        document.getElementById('login-box').classList.add('hidden');
                        document.getElementById('library').classList.remove('hidden');
                        
                        const container = document.getElementById('flex-container');
                        container.innerHTML = ''; 
                        
                        const sortedApps = data[input].sort((a, b) => a.name.localeCompare(b.name));
                        
                        sortedApps.forEach((app, index) => {
                            const card = document.createElement('div');
                            card.className = "app-card p-8 rounded-[2.5rem] flex flex-col items-center text-center shadow-2xl";
                            card.innerHTML = `
                                <img src="${app.icon}" class="w-28 h-28 rounded-3xl mb-6 shadow-xl object-cover border-2 border-zinc-800">
                                <h3 class="font-black text-2xl mb-1 uppercase tracking-tighter">${app.name}</h3>
                                <p class="text-xs text-zinc-500 mb-8 uppercase tracking-widest font-bold opacity-60">${app.desc}</p>
                                <button onclick="window.location.assign('${app.url}')" 
                                        class="install-btn w-full bg-orange-600 py-4 rounded-2xl font-black text-sm uppercase tracking-widest text-center block">
                                   Install Now
                                </button>
                            `;
                            container.appendChild(card);
                        });

                        // Automatically focus the first button so the remote works immediately
                        setTimeout(() => {
                            const firstBtn = document.querySelector('.install-btn');
                            if (firstBtn) firstBtn.focus();
                        }, 100);
                    } else { 
                        alert("Access Code Invalid"); 
                    }
                });
        }
    </script>
</body>
</html>
